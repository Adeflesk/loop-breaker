name: CI

on:
  push:
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r backend/requirements.txt

      - name: Run backend tests with coverage
        working-directory: backend
        run: python -m pytest tests --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=65

      - name: Check app/ai.py coverage (≥70%)
        working-directory: backend
        run: python -m coverage report --include="app/ai.py" --fail-under=70

      - name: Check app/db.py coverage (≥60%)
        working-directory: backend
        run: python -m coverage report --include="app/db.py" --fail-under=60

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Run frontend tests
        working-directory: frontend
        run: flutter test
